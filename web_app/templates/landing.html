<!DOCTYPE html>
<html>
<head>
    <title>Health Screening Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M9 19v-6a2 2 0 00-2 2v6a2 2 0 002 2zm0 0h16v-16h-16z'/></svg>">
</head>
<body>
    <div class="landing-container">
        <div class="content-wrapper">
            <div class="header-section">
                <h1 class="main-title">Health Screening</h1>
                <p class="subtitle">AI-Driven Depression Severity Assessment</p>
            </div>
            
            <div class="action-section">
                <button id="launch-portal" class="launch-button">
                    <span class="button-text">Launch Screening Portal</span>
                </button>
                
                <div class="features-grid">
                    <div class="feature-card">
                        <div class="feature-title">Real-time Analysis</div>
                        <div class="feature-description">Live facial expression monitoring</div>
                    </div>
                    <div class="feature-card">
                        <div class="feature-title">Clinical Reports</div>
                        <div class="feature-description">Comprehensive assessment results</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-title">Professional Mental Health Screening System</div>
            <div class="footer-subtitle">CNN-BiLSTM Ensemble with Dynamic Thresholding</div>
        </div>
    </div>
    
    <script src="/js/script.js"></script>
</body>
</html>
